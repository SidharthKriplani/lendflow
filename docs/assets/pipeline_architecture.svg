<svg viewBox="0 0 1100 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>

    <!-- Node gradients -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#064e3b"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#5b21b6"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#991b1b"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <linearGradient id="g7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>

    <!-- Info bar gradient -->
    <linearGradient id="infobg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="420" fill="url(#bg)"/>

  <!-- Top border accent -->
  <rect width="1100" height="3" fill="#3b82f6" opacity="0.6"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="white" font-size="20" font-weight="700" letter-spacing="0.5">LendFlow — Loan Underwriting Pipeline</text>
  <text x="550" y="58" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="0.3">LangGraph 7-Node AI-Powered Credit Decisioning</text>

  <!-- Connector arrows -->
  <!-- N1→N2 -->
  <line x1="193" y1="190" x2="213" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- N2→N3 -->
  <line x1="337" y1="190" x2="357" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- N3→N4 -->
  <line x1="481" y1="190" x2="501" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- N4→N5 -->
  <line x1="625" y1="190" x2="645" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- N5→N6 -->
  <line x1="769" y1="190" x2="789" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- N6→N7 -->
  <line x1="913" y1="190" x2="933" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- NODE 1: INTAKE (x=65) -->
  <g filter="url(#shadow)">
    <rect x="65" y="128" width="128" height="124" rx="12" fill="url(#g1)" stroke="#64748b" stroke-width="1.5"/>
    <rect x="65" y="128" width="128" height="5" rx="3" fill="#64748b"/>
  </g>
  <text x="129" y="151" text-anchor="middle" fill="#64748b" font-size="9" font-weight="700" letter-spacing="1.5">NODE 1</text>
  <text x="129" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="700">intake</text>
  <line x1="75" y1="175" x2="183" y2="175" stroke="#64748b" stroke-width="0.8" opacity="0.5"/>
  <text x="129" y="191" text-anchor="middle" fill="#94a3b8" font-size="10">PII Redaction</text>
  <text x="129" y="205" text-anchor="middle" fill="#94a3b8" font-size="10">Source Detection</text>
  <text x="129" y="219" text-anchor="middle" fill="#94a3b8" font-size="10">alert_id assign</text>
  <text x="129" y="238" text-anchor="middle" fill="#64748b" font-size="9">Presidio · regex</text>

  <!-- NODE 2: POLICY_CHECK (x=209) -->
  <g filter="url(#shadow)">
    <rect x="209" y="128" width="128" height="124" rx="12" fill="url(#g2)" stroke="#10b981" stroke-width="1.5"/>
    <rect x="209" y="128" width="128" height="5" rx="3" fill="#10b981"/>
  </g>
  <text x="273" y="151" text-anchor="middle" fill="#10b981" font-size="9" font-weight="700" letter-spacing="1.5">NODE 2</text>
  <text x="273" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="700">policy_check</text>
  <line x1="219" y1="175" x2="327" y2="175" stroke="#10b981" stroke-width="0.8" opacity="0.5"/>
  <text x="273" y="191" text-anchor="middle" fill="#6ee7b7" font-size="10">RBI/NBFC Hard Rules</text>
  <text x="273" y="205" text-anchor="middle" fill="#6ee7b7" font-size="10">LTV · Age · Income</text>
  <text x="273" y="219" text-anchor="middle" fill="#6ee7b7" font-size="10">Pincode Blacklist</text>
  <text x="273" y="238" text-anchor="middle" fill="#10b981" font-size="9">Deterministic · No LLM</text>

  <!-- NODE 3: RAG_LOOKUP (x=353) -->
  <g filter="url(#shadow)">
    <rect x="353" y="128" width="128" height="124" rx="12" fill="url(#g3)" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="353" y="128" width="128" height="5" rx="3" fill="#8b5cf6"/>
  </g>
  <text x="417" y="151" text-anchor="middle" fill="#8b5cf6" font-size="9" font-weight="700" letter-spacing="1.5">NODE 3</text>
  <text x="417" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="700">rag_lookup</text>
  <line x1="363" y1="175" x2="471" y2="175" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
  <text x="417" y="191" text-anchor="middle" fill="#c4b5fd" font-size="10">BM25 + ChromaDB</text>
  <text x="417" y="205" text-anchor="middle" fill="#c4b5fd" font-size="10">Cross-encoder Rerank</text>
  <text x="417" y="219" text-anchor="middle" fill="#c4b5fd" font-size="10">RBI · NBFC · NHB</text>
  <text x="417" y="238" text-anchor="middle" fill="#8b5cf6" font-size="9">sentence-transformers</text>

  <!-- NODE 4: FOIR_ENGINE (x=497) -->
  <g filter="url(#shadow)">
    <rect x="497" y="128" width="128" height="124" rx="12" fill="url(#g4)" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="497" y="128" width="128" height="5" rx="3" fill="#f59e0b"/>
  </g>
  <text x="561" y="151" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="700" letter-spacing="1.5">NODE 4</text>
  <text x="561" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="700">foir_engine</text>
  <line x1="507" y1="175" x2="615" y2="175" stroke="#f59e0b" stroke-width="0.8" opacity="0.5"/>
  <text x="561" y="191" text-anchor="middle" fill="#fcd34d" font-size="10">FOIR Recompute</text>
  <text x="561" y="205" text-anchor="middle" fill="#fcd34d" font-size="10">≤0.50 Approve</text>
  <text x="561" y="219" text-anchor="middle" fill="#fcd34d" font-size="10">0.50–0.65 Refer</text>
  <text x="561" y="238" text-anchor="middle" fill="#f59e0b" font-size="9">Deterministic · No LLM</text>

  <!-- NODE 5: RISK_SCORER (x=641) -->
  <g filter="url(#shadow)">
    <rect x="641" y="128" width="128" height="124" rx="12" fill="url(#g5)" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="641" y="128" width="128" height="5" rx="3" fill="#3b82f6"/>
  </g>
  <text x="705" y="151" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="700" letter-spacing="1.5">NODE 5</text>
  <text x="705" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="700">risk_scorer</text>
  <line x1="651" y1="175" x2="759" y2="175" stroke="#3b82f6" stroke-width="0.8" opacity="0.5"/>
  <text x="705" y="191" text-anchor="middle" fill="#93c5fd" font-size="10">Bureau Score Bands</text>
  <text x="705" y="205" text-anchor="middle" fill="#93c5fd" font-size="10">LTV · Employment</text>
  <text x="705" y="219" text-anchor="middle" fill="#93c5fd" font-size="10">Vintage Analysis</text>
  <text x="705" y="238" text-anchor="middle" fill="#3b82f6" font-size="9">Risk Band A/B/C/D</text>

  <!-- NODE 6: DECISION (x=785) -->
  <g filter="url(#shadow)">
    <rect x="785" y="128" width="128" height="124" rx="12" fill="url(#g6)" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="785" y="128" width="128" height="5" rx="3" fill="#ef4444"/>
  </g>
  <text x="849" y="151" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="700" letter-spacing="1.5">NODE 6</text>
  <text x="849" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="700">decision</text>
  <line x1="795" y1="175" x2="903" y2="175" stroke="#ef4444" stroke-width="0.8" opacity="0.5"/>
  <text x="849" y="191" text-anchor="middle" fill="#fca5a5" font-size="10">APPROVE / REFER</text>
  <text x="849" y="205" text-anchor="middle" fill="#fca5a5" font-size="10">REJECT + Citations</text>
  <text x="849" y="219" text-anchor="middle" fill="#fca5a5" font-size="10">EMI Calculation</text>
  <text x="849" y="238" text-anchor="middle" fill="#ef4444" font-size="9">LLM synthesis only</text>

  <!-- NODE 7: AUDIT (x=929) -->
  <g filter="url(#shadow)">
    <rect x="929" y="128" width="128" height="124" rx="12" fill="url(#g7)" stroke="#6b7280" stroke-width="1.5"/>
    <rect x="929" y="128" width="128" height="5" rx="3" fill="#6b7280"/>
  </g>
  <text x="993" y="151" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" letter-spacing="1.5">NODE 7</text>
  <text x="993" y="167" text-anchor="middle" fill="white" font-size="13" font-weight="700">audit</text>
  <line x1="939" y1="175" x2="1047" y2="175" stroke="#6b7280" stroke-width="0.8" opacity="0.5"/>
  <text x="993" y="191" text-anchor="middle" fill="#d1d5db" font-size="10">JSONL Persist</text>
  <text x="993" y="205" text-anchor="middle" fill="#d1d5db" font-size="10">audit_id Generation</text>
  <text x="993" y="219" text-anchor="middle" fill="#d1d5db" font-size="10">Immutable Log</text>
  <text x="993" y="238" text-anchor="middle" fill="#6b7280" font-size="9">Regulatory Compliant</text>

  <!-- Bottom info bar -->
  <rect x="20" y="275" width="1060" height="108" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="20" y="275" width="1060" height="3" rx="1" fill="#3b82f6" opacity="0.4"/>

  <!-- FOIR formula section -->
  <text x="40" y="298" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">FOIR ENGINE</text>
  <text x="40" y="315" fill="#fcd34d" font-size="12" font-weight="700">FOIR = (All EMIs + Proposed EMI) / Net Monthly Income</text>
  <line x1="40" y1="322" x2="560" y2="322" stroke="#334155" stroke-width="1"/>

  <!-- FOIR thresholds -->
  <rect x="40" y="330" width="130" height="24" rx="5" fill="#065f46" stroke="#10b981" stroke-width="1"/>
  <text x="105" y="346" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">≤ 0.50 → APPROVE</text>

  <rect x="182" y="330" width="130" height="24" rx="5" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="247" y="346" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">0.51–0.65 → REFER</text>

  <rect x="324" y="330" width="130" height="24" rx="5" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="389" y="346" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">&gt; 0.65 → REJECT</text>

  <!-- Signal breakdown -->
  <line x1="580" y1="285" x2="580" y2="375" stroke="#1e293b" stroke-width="1.5"/>

  <text x="600" y="298" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">SIGNAL BREAKDOWN</text>
  <text x="600" y="316" fill="#6ee7b7" font-size="10">Bureau Score</text>
  <rect x="688" y="307" width="100" height="8" rx="3" fill="#1e293b"/>
  <rect x="688" y="307" width="72" height="8" rx="3" fill="#10b981"/>
  <text x="794" y="316" fill="#6b7280" font-size="9">72%</text>

  <text x="600" y="334" fill="#93c5fd" font-size="10">LTV Ratio</text>
  <rect x="688" y="325" width="100" height="8" rx="3" fill="#1e293b"/>
  <rect x="688" y="325" width="60" height="8" rx="3" fill="#3b82f6"/>
  <text x="794" y="334" fill="#6b7280" font-size="9">60%</text>

  <text x="600" y="352" fill="#c4b5fd" font-size="10">Employment</text>
  <rect x="688" y="343" width="100" height="8" rx="3" fill="#1e293b"/>
  <rect x="688" y="343" width="85" height="8" rx="3" fill="#8b5cf6"/>
  <text x="794" y="352" fill="#6b7280" font-size="9">85%</text>

  <text x="600" y="370" fill="#fcd34d" font-size="10">Vintage</text>
  <rect x="688" y="361" width="100" height="8" rx="3" fill="#1e293b"/>
  <rect x="688" y="361" width="55" height="8" rx="3" fill="#f59e0b"/>
  <text x="794" y="370" fill="#6b7280" font-size="9">55%</text>

  <!-- Tech stack section -->
  <line x1="830" y1="285" x2="830" y2="375" stroke="#1e293b" stroke-width="1.5"/>
  <text x="850" y="298" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">TECH STACK</text>
  <text x="850" y="316" fill="#64748b" font-size="10">LangGraph · FastAPI · Docker</text>
  <text x="850" y="332" fill="#64748b" font-size="10">ChromaDB · BM25 · RAGAS</text>
  <text x="850" y="348" fill="#64748b" font-size="10">sentence-transformers</text>
  <text x="850" y="364" fill="#64748b" font-size="10">cross-encoder reranker</text>

  <!-- Footer -->
  <text x="550" y="403" text-anchor="middle" fill="#334155" font-size="11">github.com/SidharthKriplani/lendflow</text>
</svg>
