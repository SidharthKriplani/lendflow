  <rect x="10" y="185" width="228" height="5" rx="3" fill="#3b82f6"/>
  <text x="124" y="207" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="700" letter-spacing="1.5">POLICY CHECKS · DETERMINISTIC</text>
