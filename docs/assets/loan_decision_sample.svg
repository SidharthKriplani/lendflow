  <text x="850" y="416" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600" letter-spacing="1">AUDIT RECORD</text>
  <text x="850" y="433" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="700">AUDIT-7F3A</text>
  <text x="850" y="450" text-anchor="middle" fill="#64748b" font-size="10">Tokens: 843 · Latency: 1,240ms</text>

  <!-- Footer -->
  <text x="490" y="483" text-anchor="middle" fill="#334155" font-size="10">github.com/SidharthKriplani/lendflow  ·  LendFlow Pipeline v1.0.0</text>
