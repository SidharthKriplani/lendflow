  <text x="700" y="129" fill="#94a3b8" font-size="11">Audit  <tspan fill="#60a5fa">AUDIT-7F3A</tspan></text>
  <text x="700" y="145" fill="#94a3b8" font-size="11">Confidence  <tspan fill="white">0.87</tspan>  ·  Tokens <tspan fill="white">843</tspan></text>

