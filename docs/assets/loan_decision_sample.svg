  <text x="850" y="352" text-anchor="middle" fill="#fca5a5" font-size="10">Audit: <tspan fill="#60a5fa">AUDIT-7F3A</tspan></text>

  <!-- Product recommendation box -->
  <rect x="10" y="385" width="960" height="90" rx="10" fill="#0f172a" stroke="#166534" stroke-width="1.5"/>
  <rect x="10" y="385" width="960" height="4" rx="2" fill="#16a34a"/>

  <text x="30" y="407" fill="#86efac" font-size="11" font-weight="700" letter-spacing="1">APPROVED PRODUCT</text>
