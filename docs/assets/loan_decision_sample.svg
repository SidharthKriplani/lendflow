  <text x="30" y="444" fill="#94a3b8" font-size="11">Policy citations: RBI Master Direction §2.3.1  ·  NBFC Circular §4.2  ·  NHB Guidelines §3.1</text>
  <text x="30" y="461" fill="#64748b" font-size="11">Loan Amount: ₹8,50,000  ·  Vehicle: Maruti Swift (New)  ·  LTV: 68.5%  ·  Disbursement SLA: 2 days</text>

